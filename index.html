<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة تخمين الرقم</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🎯 لعبة تخمين الرقم</h1>

        <p class="description">
            حاول تخمين الرقم بين <strong>1</strong> و <strong>100</strong>
        </p>

        <div class="stats">

            <div class="card">
                <span>المحاولات</span>
                <h2 id="attempts">10</h2>
            </div>

            <div class="card">
                <span>أفضل نتيجة</span>
                <h2 id="bestScore">-</h2>
            </div>

        </div>

        <input
            type="number"
            id="guessInput"
            min="1"
            max="100"
            placeholder="اكتب الرقم">

        <button id="guessBtn">
            تخمين
        </button>

        <p id="message">
            ابدأ بالتخمين...
        </p>

        <button id="restartBtn">
            🔄 لعبة جديدة
        </button>

    </div>

    <script src="script.js"></script>

</body>

</html>
