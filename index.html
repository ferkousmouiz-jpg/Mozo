<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Mini RPG</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="game">

<h1>⚔️ Mini RPG</h1>

<div class="hud">

<div>

<h3>🧍 اللاعب</h3>

<div class="bar">

<div id="playerHp"></div>

</div>

<p id="playerText">
100 / 100
</p>

</div>

<div>

<h3>👾 الوحش</h3>

<div class="bar">

<div id="enemyHp"></div>

</div>

<p id="enemyText">
100 / 100
</p>

</div>

</div>

<canvas
id="gameCanvas"
width="640"
height="400">
</canvas>

<div class="buttons">

<button id="attackBtn">

⚔️ هجوم

</button>

<button id="restartBtn">

🔄 إعادة

</button>

</div>

<p id="message">

ابدأ اللعبة

</p>

</div>

<script src="script.js"></script>

</body>
</html>
